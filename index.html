<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi qualité — Secteur MCU</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#F5F4F0; --surface:#FFFFFF; --border:#E2DFD5; --border-strong:#C9C4B5;
  --text:#1C1B18; --text-muted:#6E6A60; --text-faint:#9C978A;
  --accent:#1F5C5C; --accent-dark:#143E3E; --accent-bg:#E6EFEE;
  --ok:#2E7D4F; --ok-bg:#E5F3E9; --ok-border:#BFE0CB;
  --warn:#B8730A; --warn-bg:#FBEEDC; --warn-border:#F0D6A6;
  --danger:#B23B2E; --danger-bg:#FBE7E3; --danger-border:#EFC2B8;
  --neutral:#6E6A60; --neutral-bg:#EFEDE7;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:var(--sans); background:var(--bg); color:var(--text); line-height:1.5; font-size:14px;}
.app{max-width:1180px; margin:0 auto; padding:20px 24px 60px;}
header.top{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:8px;}
header.top h1{font-size:20px; font-weight:600; letter-spacing:-0.01em;}
header.top .sub{color:var(--text-muted); font-size:13px;}
nav.tabs{display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:22px; overflow-x:auto;}
nav.tabs button{font-family:var(--sans); background:none; border:none; padding:10px 14px; font-size:13.5px; font-weight:500; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;}
nav.tabs button:hover{color:var(--text);}
nav.tabs button.active{color:var(--accent-dark); border-bottom-color:var(--accent);}
.eyebrow{font-size:11.5px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:var(--text);}
.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px;}
.grid{display:grid; gap:14px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
.alert-cols{display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start;}
@media (max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-2{grid-template-columns:1fr;} .alert-cols{grid-template-columns:1fr;}}
@media (max-width:560px){.grid-4{grid-template-columns:1fr;}}
.statcard{border-left:3px solid var(--border-strong); padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);}
.statcard.s-ok{border-left-color:var(--ok);}
.statcard.s-warn{border-left-color:var(--warn);}
.statcard.s-danger{border-left-color:var(--danger);}
.statcard .val{font-family:var(--mono); font-size:22px; font-weight:600; margin:4px 0 2px;}
.statcard .lbl{font-size:12.5px; color:var(--text-muted);}
.badge{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; padding:3px 8px; border-radius:5px; white-space:nowrap;}
.badge .dot{width:6px; height:6px; border-radius:50%; display:inline-block;}
.badge.b-ok{background:var(--ok-bg); color:var(--ok);} .badge.b-ok .dot{background:var(--ok);}
.badge.b-warn{background:var(--warn-bg); color:var(--warn);} .badge.b-warn .dot{background:var(--warn);}
.badge.b-danger{background:var(--danger-bg); color:var(--danger);} .badge.b-danger .dot{background:var(--danger);}
.badge.b-neutral{background:var(--neutral-bg); color:var(--neutral);} .badge.b-neutral .dot{background:var(--neutral);}
.badge.b-urgent{background:#FDECD6; color:#C25A00; font-weight:700;} .badge.b-urgent .dot{background:#C25A00;}
table{width:100%; border-collapse:collapse; font-size:13px;}
th{text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:0.03em; color:var(--text-faint); font-weight:600; padding:8px 10px; border-bottom:1px solid var(--border);}
td{padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:middle;}
td.num{font-family:var(--mono);}
tr:hover td{background:#FBFAF8;}
.table-wrap{overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface);}
.section{margin-bottom:28px;}
.section h2{font-size:16px; font-weight:600; margin-bottom:12px;}
.toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:10px; flex-wrap:wrap;}
.toolbar .left{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
button.btn{font-family:var(--sans); cursor:pointer; border-radius:var(--radius-sm); font-size:13px; font-weight:500; padding:7px 13px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text);}
button.btn:hover{background:#F2F0EA;}
button.btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
button.btn.primary:hover{background:var(--accent-dark);}
button.btn.danger-outline{color:var(--danger); border-color:var(--danger-border);}
button.btn.small{padding:4px 9px; font-size:12px;}
select, input, textarea{font-family:var(--sans); font-size:13px; padding:7px 9px; border:1px solid var(--border-strong); border-radius:var(--radius-sm); background:#fff; color:var(--text);}
input[type=file]{padding:4px;}
label.field{display:flex; flex-direction:column; gap:4px; font-size:12.5px; color:var(--text-muted); font-weight:500;}
form.entryform{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; background:#FBFAF7; border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px;}
form.entryform.cols2{grid-template-columns:repeat(2,1fr);}
@media (max-width:760px){form.entryform{grid-template-columns:1fr;}}
form.entryform .full{grid-column:1/-1;}
form.entryform .actions-row{grid-column:1/-1; display:flex; gap:8px; justify-content:flex-end;}
.alertlist{display:flex; flex-direction:column; gap:8px;}
.alertitem{display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:var(--radius-sm); border:1px solid var(--border);}
.alertitem .txt{font-size:13px;}
.alertitem .meta{font-size:11.5px; color:var(--text-faint); margin-top:2px;}
.empty{color:var(--text-faint); font-size:13px; padding:18px; text-align:center;}
.subtabs{display:flex; gap:6px; margin-bottom:14px;}
.subtabs button{font-family:var(--sans); border:1px solid var(--border-strong); background:var(--surface); padding:6px 12px; border-radius:999px; font-size:12.5px; font-weight:500; cursor:pointer; color:var(--text-muted);}
.subtabs button.active{background:var(--accent); border-color:var(--accent); color:#fff;}
.thumb{width:34px; height:34px; border-radius:5px; object-fit:cover; border:1px solid var(--border); cursor:pointer;}
.exportbox{background:#FBFAF7; border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-top:12px;}
.exportbox textarea{width:100%; min-height:160px; font-family:var(--mono); font-size:12px; resize:vertical;}
.checklist-item{display:grid; grid-template-columns:1fr 90px 1fr 1fr 90px; gap:8px; padding:9px 0; border-bottom:1px solid var(--border); align-items:start; font-size:12.5px;}
.checklist-item .ci-label b{display:block; font-size:12.5px;} .checklist-item .ci-label span{color:var(--text-faint); font-size:11px;}
@media (max-width:900px){.checklist-item{grid-template-columns:1fr; gap:4px;}}
.muted{color:var(--text-muted);}
.tiny{font-size:11.5px; color:var(--text-faint);}
.linebadges{display:flex; flex-direction:column; gap:7px; margin-top:8px;}
.linebadge{display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:12.5px; font-weight:600;}
.alert-toolbar{display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center;}
.alert-toolbar select{font-size:12.5px;}
.alert-group-title{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; margin:18px 0 8px; padding:4px 0; border-bottom:2px solid var(--border-strong);}
.alert-group-title:first-child{margin-top:0;}
.alert-group-danger{color:var(--danger); border-bottom-color:var(--danger);}
.alert-group-warn{color:var(--warn); border-bottom-color:var(--warn);}
.alert-table-danger{border-left:3px solid var(--danger);}
.alert-table-warn{border-left:3px solid var(--warn);}
.delay-pill{display:inline-block; padding:2px 8px; border-radius:10px; font-size:11.5px; font-weight:700; font-family:var(--mono);}
.delay-pill.delay-late{background:#D6483A; color:#fff;}
.delay-pill.delay-soon{background:#E0922A; color:#fff;}
.delay-pill.delay-ok{background:var(--neutral-bg); color:var(--text-muted);}
tr.alert-row{cursor:pointer;}
tr.alert-row td{font-size:13px;}
tr.alert-detail-row td{background:#FBFAF7; font-size:12.5px; color:var(--text-muted); padding:10px 14px;}
.chev{display:inline-block; transition:transform 0.15s; color:var(--text-faint); font-size:11px;}
tr.alert-row.expanded .chev{transform:rotate(90deg);}
.wizard-dots{display:flex; align-items:center; gap:6px; margin-bottom:18px;}
.wizard-dot{width:26px; height:26px; border-radius:50%; background:var(--neutral-bg); color:var(--text-faint); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; border:1px solid var(--border-strong); flex-shrink:0;}
.wizard-dot.active{background:var(--accent); color:#fff; border-color:var(--accent);}
.wizard-dot.done{background:var(--ok); color:#fff; border-color:var(--ok);}
.wizard-line{flex:1; height:1px; background:var(--border-strong); max-width:50px;}
.score-big{font-family:var(--mono); font-size:48px; font-weight:700; text-align:center;}
.annual-table td.score-cell{text-align:center; font-family:var(--mono); font-weight:600; cursor:pointer;}
.annual-table td.score-cell:hover{outline:2px solid var(--accent); outline-offset:-2px;}
.annual-table td.c-empty{text-align:center; color:var(--text-faint);}
.sc-ok{background:#2E9E5B; color:#fff;}
.sc-warn{background:#E0922A; color:#fff;}
.sc-danger{background:#D6483A; color:#fff;}
.chart-box{position:relative; height:260px;}
.modal-overlay{position:fixed; inset:0; background:rgba(28,27,24,0.5); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
.modal-box{background:#fff; border-radius:var(--radius); padding:22px; max-width:560px; width:100%; max-height:80vh; overflow-y:auto;}
.modal-box h3{margin-bottom:14px; font-size:16px;}
.userbox{display:flex; align-items:center; gap:10px;}
.userbox .uname{font-size:13px; font-weight:600;}
.userbox .urole{font-size:11.5px; color:var(--text-muted);}
#login-overlay{position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100;}
#login-overlay.hidden{display:none;}
.login-box{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:32px; width:100%; max-width:380px;}
.login-box h1{font-size:18px; margin-bottom:4px;}
.login-box .sub{color:var(--text-muted); font-size:13px; margin-bottom:20px;}
.login-box label.field{display:flex; flex-direction:column; gap:5px; font-size:12.5px; font-weight:600; color:var(--text-muted); margin-bottom:14px;}
.login-box input, .login-box select{font-family:var(--sans); padding:9px 10px; border:1px solid var(--border-strong); border-radius:var(--radius-sm); font-size:14px;}
.login-error{color:var(--danger); font-size:12.5px; margin-bottom:10px; min-height:1em;}
.perm-table th, .perm-table td{text-align:center;}
.perm-table td:first-child, .perm-table th:first-child{text-align:left;}
.perm-table input[type=checkbox]{width:16px; height:16px; cursor:pointer;}
.role-protected{color:var(--text-faint); font-style:italic;}
@media print{
  @page{ size: A4 landscape; margin: 10mm; }
  nav.tabs, .userbox, .dash-actions-noprint, #digest-box, header.top .sub:last-child{display:none !important;}
  body{background:#fff; font-size:10.5px;}
  .card, .statcard{break-inside:avoid;}
  .chart-box{height:150px !important; overflow:hidden; margin-bottom:10px;}
  .grid-4{grid-template-columns:repeat(4,1fr) !important;}
  .alert-table thead{display:table-header-group;}
  .alert-table tr{break-inside:avoid;}
  .alert-cols{display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:start;}
  .alert-group-title{font-size:11px; margin:8px 0 4px;}
  .alert-toolbar{display:none !important;}
  .alert-table th, .alert-table td{padding:3px 6px; font-size:9.5px;}
  tr.alert-detail-row{display:none !important;}
  .chev{display:none;}
  h1{font-size:15px;}
  .eyebrow{font-size:10px;}
  .section{margin-bottom:8px !important;}
}
</style>
</head>

// ---------- storage ----------
var STORAGE_MODE = supabaseClient ? 'supabase' : 'claude'; // 'supabase' | 'claude' (partagé) | 'local' (repli navigateur)
var storageWarned = false;

function supabaseGet(key){
  return supabaseClient.from('kv_store').select('value').eq('key', key).maybeSingle().then(function(res){
    if(res.error) throw new Error(res.error.message);
    return res.data ? {key:key, value: JSON.stringify(res.data.value), shared:true} : null;
  });
}
function supabaseSet(key, value){
  return supabaseClient.from('kv_store').upsert({key:key, value: JSON.parse(value)}, {onConflict:'key'}).then(function(res){
    if(res.error) throw new Error(res.error.message);
    return {key:key, value:value, shared:true};
  });
}
function backendGetLocal(key){
  STORAGE_MODE = 'local';
  var raw = null;
  try{ raw = localStorage.getItem(key); }catch(e){ raw = null; }
  return Promise.resolve(raw!==null ? {key:key, value:raw, shared:false} : null);
}
function backendSetLocal(key, value){
  STORAGE_MODE = 'local';
  try{ localStorage.setItem(key, value); }catch(e){ /* ignore quota errors */ }
  return Promise.resolve({key:key, value:value, shared:false});
}
function backendGet(key){
  if(supabaseClient){
    return supabaseGet(key).catch(function(e){ console.error('Supabase get error', e); return backendGetLocal(key); });
  }
  if(window.storage && typeof window.storage.get === 'function'){
    STORAGE_MODE = 'claude';
    return window.storage.get(key, true);
  }
  return backendGetLocal(key);
}
function backendSet(key, value){
  if(supabaseClient){
    return supabaseSet(key, value).catch(function(e){ console.error('Supabase set error', e); return backendSetLocal(key, value); });
  }
  if(window.storage && typeof window.storage.set === 'function'){
    STORAGE_MODE = 'claude';
    return window.storage.set(key, value, true);
  }
  return backendSetLocal(key, value);
}

async function loadAll(){
  var pairs = Object.keys(KEYS);
  for(var i=0;i<pairs.length;i++){
    var k = pairs[i];
    try{
      var r = await backendGet(KEYS[k]);
      if(r && r.value){ DATA[k] = JSON.parse(r.value); }
      else { await seedKey(k); }
    }catch(e){ console.error('load error', k, e); await seedKey(k); }
  }
  if(STORAGE_MODE==='local' && !storageWarned){
    storageWarned = true;
    console.warn('Stockage local utilisé (Supabase/Claude indisponible) — les données ne sont pas partagées avec l\'équipe.');
  }
}
async function seedKey(k){
  if(window.SEED && window.SEED[k] !== undefined){
    DATA[k] = window.SEED[k];
    await save(k);
  }
}
async function save(k){
  try{ await backendSet(KEYS[k], JSON.stringify(DATA[k])); }
  catch(e){ console.error('storage error', k, e); }
}

// ---------- status helpers ----------
function metroStatus(e){
  if(!e.echeance) return {level:'neutral', label:'Sans échéance', expiresThisMonth:false};
  var today = todayStr();
  var curYYYYMM = today.slice(0,7);
  var eYYYYMM = e.echeance.slice(0,7);
  var d = daysBetween(today, e.echeance);
  // expiré avant ce mois → vraiment en retard
  if(eYYYYMM < curYYYYMM) return {level:'danger', label:'En retard', expiresThisMonth:false};
  // expire dans le mois en cours → urgent mais encore valide
  if(eYYYYMM === curYYYYMM) return {level:'urgent', label:'Expire ce mois', expiresThisMonth:true};
  // expire le mois prochain
  if(d<=31) return {level:'warn', label:'À prévoir', expiresThisMonth:false};
  return {level:'ok', label:'À jour', expiresThisMonth:false};
}
function globalConformityScore(){
  var parts = [];
  var detail = [];
  var proprVals = LINES.map(latestResultByLine).filter(Boolean).map(function(r){return r.resultatPct;});
  if(proprVals.length){
    var p = proprVals.reduce(function(a,b){return a+b;},0)/proprVals.length;
    parts.push(p); detail.push({label:'Propreté', val:Math.round(p)});
  }
  if(DATA.metro.length){
    var lateCount = DATA.metro.filter(function(e){ return metroStatus(e).level==='danger'; }).length;
    var m = (1 - lateCount/DATA.metro.length)*100;
    parts.push(m); detail.push({label:'Métrologie à jour', val:Math.round(m)});
  }
  var contamYear = DATA.contamination.filter(function(c){ return c.annee===Number(todayStr().slice(0,4)) && (c.statut==='ok'||c.statut==='nc'); });
  if(contamYear.length){
    var okCount = contamYear.filter(function(c){return c.statut==='ok';}).length;
    var c = okCount/contamYear.length*100;
    parts.push(c); detail.push({label:'Contamination conforme', val:Math.round(c)});
  }
  var relevantActions = DATA.actions.filter(function(a){ return a.statut!=='abandonnee'; });
  if(relevantActions.length){
    var lateA = relevantActions.filter(isActionLate).length;
    var ac = (1-lateA/relevantActions.length)*100;
    parts.push(ac); detail.push({label:"Actions dans les temps", val:Math.round(ac)});
  }
  if(!parts.length) return {score:null, detail:[]};
  return {score: Math.round(parts.reduce(function(a,b){return a+b;},0)/parts.length), detail:detail};
}
async function recordScoreSnapshot(gs){
  if(gs.score===null) return;
  var today = todayStr();
  var existing = DATA.scoreHistory.find(function(s){ return s.date===today; });
  if(existing){ existing.score = gs.score; existing.detail = gs.detail; }
  else { DATA.scoreHistory.push({date:today, score:gs.score, detail:gs.detail}); }
  if(DATA.scoreHistory.length>730) DATA.scoreHistory = DATA.scoreHistory.slice(-730);
  await save('scoreHistory');
}
function previousMonthScore(){
  var d = new Date(); d.setDate(1); d.setMonth(d.getMonth()-1);
  var key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  var vals = DATA.scoreHistory.filter(function(s){ return s.date.slice(0,7)===key; }).map(function(s){return s.score;});
  if(!vals.length) return null;
  return Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);
}
function metroOverall(lines){
  var items = DATA.metro.filter(function(e){ return !lines || lines.indexOf(e.ligne)>=0; });
  if(!items.length) return {level:'neutral', label:'Aucune donnée', late:0, urgent:0, warn:0, worstItem:null, worstLabel:null};
  var late=0, urgent=0, warn=0, worst='ok', worstItem=null, worstDays=Infinity;
  items.forEach(function(e){
    var s = metroStatus(e);
    if(s.level==='danger') late++;
    else if(s.level==='urgent') urgent++;
    else if(s.level==='warn') warn++;
    if(s.level==='danger' && worst!=='danger') worst='danger';
    else if(s.level==='urgent' && worst==='ok') worst='urgent';
    else if(s.level==='warn' && worst==='ok') worst='warn';
    if(e.echeance){
      var d = daysBetween(todayStr(), e.echeance);
      if(d<worstDays){ worstDays = d; worstItem = e; }
    }
  });
  var lbl = worst==='danger'?'Échéance dépassée':worst==='urgent'?'Expire ce mois':worst==='warn'?'À prévoir':'À jour';
  return {level:worst, label:lbl, late:late, urgent:urgent, warn:warn, worstItem: (worst!=='ok'? worstItem : null), worstLabel: (worst!=='ok' && worstItem? daysLabel(worstItem.echeance) : null)};
}
function planningStatus(p){

  var worst='ok';
  items.forEach(function(p){ var s=planningStatus(p).level; if(s==='danger') worst='danger'; else if(s==='warn'&&worst!=='danger') worst='warn'; });
  return {level:worst, label: worst==='danger'?'En retard':worst==='warn'?'À venir':'À jour'};
}
// Renvoie l'échéance la plus pertinente "en ce moment" pour un type+ligne donné :
// la plus en retard si non réalisée, sinon la plus proche à venir, sinon la dernière réalisée.
function planningCurrentEntry(type, ligne){
  var items = DATA.planning.filter(function(p){ return p.type===type && p.ligne===ligne; });
  if(!items.length) return null;
  var today = todayStr();
  var overdue = items.filter(function(p){ return !p.realisation && p.echeance && p.echeance<=today; })
    .sort(function(a,b){ return a.echeance.localeCompare(b.echeance); });
  if(overdue.length) return overdue[0];
  var upcoming = items.filter(function(p){ return !p.realisation && p.echeance && p.echeance>today; })
    .sort(function(a,b){ return a.echeance.localeCompare(b.echeance); });
  if(upcoming.length) return upcoming[0];
  var done = items.filter(function(p){ return p.realisation; })
    .sort(function(a,b){ return b.realisation.localeCompare(a.realisation); });
  if(done.length) return done[0];
  return items[0];
}

// ---------- file handling ----------
function readImageResized(file){
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(ev){
      var img = new Image();
      img.onload = function(){
        var maxDim=900, w=img.width, h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        var canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.62));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function readFilePlain(file){
  return new Promise(function(resolve, reject){
    if(file.size > 1500000){ reject(new Error('Fichier trop volumineux (max 1.5 Mo). Compressez-le avant import.')); return; }
    var reader = new FileReader();
    reader.onload = function(ev){ resolve(ev.target.result); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function fileFromInput(input, isImage){
  if(!input || !input.files || !input.files[0]) return null;
  var f = input.files[0];
  return isImage ? readImageResized(f) : readFilePlain(f);
}

  }
  if(type==='textarea'){
    return '<label class="field full">'+esc(label)+'<textarea name="'+name+'" rows="2"></textarea></label>';
  }
  if(type==='file'){
    return '<label class="field">'+esc(label)+'<input type="file" name="'+name+'" accept="image/*,application/pdf"></label>';
  }
  var v = (type==='date' && !noDefault) ? ' value="'+todayStr()+'"' : '';
  return '<label class="field">'+esc(label)+'<input type="'+type+'" name="'+name+'"'+v+'></label>';
}

async function handleSaveAudit(){
  var w = auditWizard;
  var sc = computeAuditScore(w.items);
  var key = checklistKeyForLigne(w.ligne);
  var itemsArr = (DATA.checklist[key]||[]).map(function(it){
    var st = w.items[it.id] || {result:'', remarque:'', action:'', photo:null};
    return {poste:it.poste, critere:it.critere, result:st.result, remarque:st.remarque, action:st.action, photo:st.photo||null};
  });
  var record = {id:uid('paud'), ligne:w.ligne, date:w.date, auditeur:w.auditeur, service:w.service, score:sc.score, ok:sc.ok, ng:sc.ng, items:itemsArr};
  DATA.propAudits.push(record);
  await save('propAudits');
  var annee = Number(w.date.split('-')[0]);
  var moisLabel = MONTHS_FR[Number(w.date.split('-')[1])-1];
  moisLabel = moisLabel.charAt(0).toUpperCase()+moisLabel.slice(1);
  await recomputeResultatMois(w.ligne, moisLabel, annee);

  // pousser les NC dans le plan d'actions unifié
  var created = 0;

    if(st.result==='NG'){

        id: uid('act'), origine:'Propreté', description:(crit?crit.critere:'Non-conformité')+(crit&&crit.poste!=='Général'?' ('+crit.poste+')':'')+(st.remarque?' — '+st.remarque:''),
        ligne:w.ligne, responsable:st.responsable||'', echeance:st.echeance||null, statut:'planifiee', dateCreation:todayStr(), photo:st.photo||null
      });
      created++;
    }
  });
  if(created) await save('actions');

  auditWizard = null;
  logChange('Propreté', 'Audit réalisé', w.ligne+' — score '+(sc.score!==null?sc.score+'%':'n/a'));
  alert('Audit enregistré'+(sc.score!==null? ' — score '+sc.score+'%.':' (aucun critère renseigné).')+' '+created+' non-conformité(s) ajoutée(s) au plan d\'actions.');
  render();
}
async function recomputeResultatMois(ligne, moisLabel, annee){
  var audits = DATA.propAudits.filter(function(a){
    if(a.ligne!==ligne || a.score===null || a.score===undefined) return false;
    var d = a.date.split('-');
    var aMois = MONTHS_FR[Number(d[1])-1]; aMois = aMois.charAt(0).toUpperCase()+aMois.slice(1);
    return aMois===moisLabel && Number(d[0])===annee;
  });
  var existing = DATA.resultats.find(function(r){ return r.ligne===ligne && r.mois===moisLabel && (r.annee===annee || r.annee===undefined); });
  if(!audits.length){
    if(existing){ DATA.resultats = DATA.resultats.filter(function(r){ return r!==existing; }); await save('resultats'); }
    return;
  }
  var avg = Math.round(audits.reduce(function(s,a){return s+a.score;},0)/audits.length);
  if(existing){ existing.resultatPct = avg; existing.annee = annee; }
  else { DATA.resultats.push({id:uid('ra'), ligne:ligne, mois:moisLabel, resultatPct:avg, annee:annee}); }
  await save('resultats');
}

function monthRecapValue(ligne, monthIdx, year){
  var moisLabel = MONTHS_FR[monthIdx].charAt(0).toUpperCase()+MONTHS_FR[monthIdx].slice(1);
  var audits = DATA.propAudits.filter(function(a){
    if(a.ligne!==ligne || a.score===null || a.score===undefined) return false;
    var d = a.date.split('-');
    return Number(d[0])===year && Number(d[1])-1===monthIdx;
  });
  if(audits.length){
    return {val: Math.round(audits.reduce(function(s,a){return s+a.score;},0)/audits.length), source:'audits', n:audits.length};
  }
  var legacy = DATA.resultats.find(function(r){ return r.ligne===ligne && r.mois===moisLabel && (r.annee===year || r.annee===undefined); });
  if(legacy && legacy.resultatPct!==null && legacy.resultatPct!==undefined){
    return {val:legacy.resultatPct, source:'historique', n:1};
  }
  return null;
}
function weeksOfMonth(year, monthIdx){
  var weeks = [];
  var d = new Date(year, monthIdx, 1);
  while(d.getMonth()===monthIdx){
    var info = isoWeekInfo(fmtISOLocal(d));
    if(!weeks.some(function(w){return w.year===info.year && w.week===info.week;})) weeks.push(info);
    d.setDate(d.getDate()+1);
  }
  return weeks;
}

function isoWeekInfo(dateStr){
  var d = new Date(dateStr+'T00:00:00');
  var dayNr = (d.getDay()+6)%7;
  d.setDate(d.getDate()-dayNr+3);
  var firstThursday = d.getTime();
  var jan4 = new Date(d.getFullYear(),0,4);
  var jan4Day = (jan4.getDay()+6)%7;
  jan4.setDate(jan4.getDate()-jan4Day+3);
  var week = 1+Math.round((firstThursday-jan4.getTime())/(7*24*3600*1000));
  return {year:d.getFullYear(), week:week};
}
function isoWeeksInYear(year){
  var p = function(y){ var d=new Date(y,0,1); var dow=d.getDay(); return dow===4 || (dow===3 && (y%4===0 && (y%100!==0||y%400===0))); };
  return p(year)? 53 : 52;
}
function isoWeekMondayDate(year, week){
  var jan4 = new Date(year,0,4);
  var jan4Day = (jan4.getDay()+6)%7;
  var monday1 = new Date(jan4.getTime()); monday1.setDate(jan4.getDate()-jan4Day);
  var target = new Date(monday1.getTime()); target.setDate(monday1.getDate()+(week-1)*7);
  return fmtISOLocal(target);
}

  html += '<div class="card" style="margin-bottom:18px;">'+
    '<div class="eyebrow" style="margin-bottom:10px;">2 — Saisir les mesures (laboratoire)</div>';

    html += '<div class="empty">Aucun échantillon en attente. Les collectes déclarées apparaissent ici.</div>';
  } else {
    html += '<div class="table-wrap"><table><thead><tr><th>Ligne</th><th>Référence</th><th>Type</th><th>Collecté le</th><th>N° série</th><th></th></tr></thead><tbody>';
    html += pendingItems.map(function(c){
      if(contamAnalyseEditId === c.id) return analyseFormRow(c);
      return '<tr><td>'+esc(c.ligne)+'</td><td>'+esc(c.ref)+'</td><td>'+

        '<td class="num">'+fmtDate(c.collecteDate)+'</td><td class="num tiny">'+esc(val(c.serie,'—'))+'</td>'+

    var m = mRaw.charAt(0).toUpperCase()+mRaw.slice(1);
    html += '<tr><td>'+m+'</td>';

      var cls = lvl==='danger'?'sc-danger':lvl==='warn'?'sc-warn':lvl==='ok'?'sc-ok':'';

  if(legacy.length){
    html += '<p class="tiny" style="margin-top:14px;">'+legacy.length+' relevé(s) historique(s) non rattachés à une ligne précise (144P et 143X existent sur MCU1 et MCU2).</p>';
  }
  return html;
}

async function handleSaveAnalyseContam(id){
  var rec = DATA.contamination.find(function(c){ return c.id===id; });

var VIDANGE_INTERVALLE = 90;
function vidangeStatus(v){
  var next = addDays(v.derniereVidange, v.intervalle||VIDANGE_INTERVALLE);
  var d = daysBetween(todayStr(), next);
  if(d<0) return {level:'danger', label:'En retard', next:next};
  if(d<=14) return {level:'warn', label:'À prévoir', next:next};
  return {level:'ok', label:'À jour', next:next};
}
function addDays(dateStr, n){
  var p = dateStr.split('-').map(Number);
  var d = new Date(p[0], p[1]-1, p[2]);
  d.setDate(d.getDate()+n);
  return fmtISOLocal(d);
}

function campagneForm(){

    isoWeekInfo(todayStr()).year,
    isoWeekInfo(todayStr()).week
  );
  // Find Friday of current week (monday + 4)
  var d = new Date(nextFriday+'T00:00:00');
  var dayOfWeek = d.getDay();
  var daysToFriday = dayOfWeek===5 ? 0 : (5-dayOfWeek+7)%7;
  d.setDate(d.getDate()-3+daysToFriday); // approx friday
  var fridayStr = fmtISOLocal(d);

  return '<div class="card" style="max-width:480px; margin-bottom:16px;">'+
    '<div class="eyebrow" style="margin-bottom:10px;">Nouvelle semaine de relevé</div>'+
    '<p class="tiny" style="margin-bottom:12px;">Crée automatiquement 4 campagnes "En pose" (MCU1+MCU2 × OP1060+OP1070). Chaque vendredi, vous renseignerez le numéro de DT et le résultat labo.</p>'+

// ---------- ARCHIVES ----------
function toCSV(rows, columns){
  var lines = [columns.map(function(c){return c[1];}).join(';')];
  rows.forEach(function(r){
    lines.push(columns.map(function(c){
      var v = r[c[0]];
      if(v===null||v===undefined) v='';
      v = String(v).replace(/"/g,'""');
      if(v.indexOf(';')>=0 || v.indexOf('"')>=0 || v.indexOf('\n')>=0) v = '"'+v+'"';
      return v;
    }).join(';'));
  });
  return lines.join('\r\n');
}
function downloadText(filename, text, mime){
  mime = mime || 'text/csv;charset=utf-8';
  var blob = new Blob(['\ufeff'+text], {type:mime});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

    filename = 'Metrologie_etat_au_'+todayStr()+'.csv';

    columns = [['ligne','Ligne'],['mois','Mois'],['resultatPct','Résultat (%)']];

var ateqWeekOffset = 0;
var DAY_LABELS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
function mondayOf(dateStr){
  var p = dateStr.split('-').map(Number);
  var d = new Date(p[0], p[1]-1, p[2]);
  var dow = d.getDay();
  var diff = (dow===0? -6 : 1-dow);
  d.setDate(d.getDate()+diff);
  return d;
}
function fmtISOLocal(d){
  var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function getWeekDates(offset){
  var mon = mondayOf(todayStr());
  mon.setDate(mon.getDate()+offset*7);
  var days=[];
  for(var i=0;i<7;i++){ var d=new Date(mon); d.setDate(mon.getDate()+i); days.push(fmtISOLocal(d)); }
  return days;
}
function fmtDateShort(iso){ var p=iso.split('-'); return p[2]+'/'+p[1]; }
function currentYYYYMM(offsetMonths){
  var p = todayStr().split('-').map(Number);
  var d = new Date(p[0], p[1]-1, 1);
  d.setMonth(d.getMonth()+offsetMonths);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function monthTotal(ligne, yyyymm){
  return DATA.ateq.filter(function(a){ return a.ligne===ligne && a.date.slice(0,7)===yyyymm; })
    .reduce(function(s,a){ return s+(a.nbDefauts||0); }, 0);
}
function weeklySeries(ligne, numWeeks){
  var result = [];
  for(var w=numWeeks-1; w>=0; w--){
    var days = getWeekDates(-w);
    var total=0, nb2nd=0;
    days.forEach(function(d){
      var e = DATA.ateq.find(function(a){return a.date===d && a.ligne===ligne;});
      if(e){ total += (e.nbDefauts||0); nb2nd += (e.nb2nd||0); }
    });
    result.push({label: fmtDateShort(days[0]), total:total, nb2nd:nb2nd, taux: total>0? Math.round(nb2nd/total*100) : null});
  }
  return result;
}
function ateqMonthlySummary(numMonths){
  var rows = [];
  for(var m=numMonths-1; m>=0; m--){
    var yyyymm = currentYYYYMM(-m);
    var label = MONTHS_FR[Number(yyyymm.slice(5,7))-1];
    label = label.charAt(0).toUpperCase()+label.slice(1)+' '+yyyymm.slice(0,4);
    ['MCU1','MCU2'].forEach(function(l){
      var items = DATA.ateq.filter(function(a){ return a.ligne===l && a.date.slice(0,7)===yyyymm; });
      if(!items.length) return;
      var total = items.reduce(function(s,a){return s+(a.nbDefauts||0);},0);
      var nb2nd = items.reduce(function(s,a){return s+(a.nb2nd||0);},0);
      rows.push({label:label, ligne:l, total:total, nb2nd:nb2nd, taux: total>0? Math.round(nb2nd/total*100):0, jours:items.length});
    });
  }
  return rows.reverse();
}
function svgBarChart(items, color){
  var width = 320, height = 110;
  var max = Math.max(1, Math.max.apply(null, items.map(function(it){return it.total;})));
  var bw = width/items.length;
  var bars = items.map(function(it,i){
    var h = Math.max(2, Math.round((it.total/max)*(height-26)));
    var x = i*bw+bw*0.18, y=height-20-h, w=bw*0.64;
    return '<rect x="'+x.toFixed(1)+'" y="'+y+'" width="'+w.toFixed(1)+'" height="'+h+'" fill="'+color+'" rx="2"></rect>'+
      (it.total>0? '<text x="'+(x+w/2).toFixed(1)+'" y="'+(y-3)+'" font-size="9" text-anchor="middle" fill="#1C1B18">'+it.total+'</text>':'')+
      '<text x="'+(x+w/2).toFixed(1)+'" y="'+(height-6)+'" font-size="8.5" text-anchor="middle" fill="#9C978A">'+esc(it.label)+'</text>';
  }).join('');
  return '<svg viewBox="0 0 '+width+' '+height+'" style="width:100%; height:'+height+'px;">'+bars+'</svg>';
}
function trendBadge(current, previous){
  if(!previous) return current>0? '<span class="tiny">(mois précédent : aucune donnée)</span>' : '';
  var pct = Math.round(((current-previous)/previous)*100);
  if(pct===0) return '<span class="tiny">Stable vs mois précédent</span>';
  var up = pct>0;
  return '<span class="tiny" style="color:'+(up?'var(--danger)':'var(--ok)')+'; font-weight:600;">'+(up?'▲':'▼')+' '+Math.abs(pct)+'% vs mois précédent</span>';
}

var MODULES = ['Métrologie','Planning','ATEQ','Actions'];
var alertFilterLigne = '';
var alertFilterModule = '';
var planningMoisFilter;
var planningTypeFilter = '';
var planningLigneFilter = '';

function computeAlerts(){
  var alerts = [];
  var n = 0;
  DATA.metro.forEach(function(e){
    var s = metroStatus(e);
    if(s.level==='neutral' || s.level==='ok') return;
    // "urgent" (expire ce mois) = warn dans les alertes, "danger" = danger
    var alertLevel = s.level==='urgent' ? 'warn' : s.level;
    alerts.push({id:'al-'+(n++), level:alertLevel, module:'Métrologie', ligne:e.ligne, echeance:e.echeance,
      title: e.designation || 'Instrument', meta: s.label,
      detail: 'N° du moyen : '+esc(e.numMoyen)+' · Lieu : '+esc(val(e.lieu,'non précisé'))});
  });
  PLAN_TYPES.forEach(function(t){
    LINES.forEach(function(l){
      var cur = planningCurrentEntry(t[0], l);
      if(!cur) return;
      var s = planningStatus(cur);
      if(s.level==='danger'||s.level==='warn'){
        alerts.push({id:'al-'+(n++), level:s.level, module:'Planning', ligne:l, echeance:cur.echeance,
          title: t[1], meta: s.label,
          detail: 'Responsable : '+esc(val(cur.responsable,'non précisé'))+(cur.email? ' ('+esc(cur.email)+')':'')+' · Mois : '+esc(val(cur.mois,''))});
      }
    });
  });
  ['MCU1','MCU2'].forEach(function(l){
    var s = ateqStatusForLine(l);
    if(s.level!=='ok'){
      var last = ateqLastByLine(l);
      alerts.push({id:'al-'+(n++), level:s.level, module:'ATEQ', ligne:l, echeance:null,
        title:'Défauts ATEQ — saisie en attente', meta: s.label,
        detail: last? ('Dernière saisie enregistrée le '+fmtDate(last.date)+' ('+last.nbDefauts+' défauts).') : 'Aucune saisie enregistrée.'});
    }
  });
  DATA.actions.filter(isActionLate).forEach(function(a){
    alerts.push({id:'al-'+(n++), level:'danger', module:'Actions', ligne:a.ligne||'', echeance:a.echeance,
      title: a.description, meta:(a.responsable||'sans responsable'),
      detail: 'Origine : '+esc(val(a.origine,'—'))+' · Créée le '+fmtDate(a.dateCreation)});
  });
  return alerts;
}

var alertHorizon = 14;
function daysLabel(echeance){
  if(!echeance) return null;
  var d = daysBetween(todayStr(), echeance);
  if(d<0) return {d:d, text:'En retard de '+Math.abs(d)+' j'};
  if(d===0) return {d:d, text:"Aujourd'hui"};
  return {d:d, text:'Dans '+d+' j'};
}
function renderAlertsSection(){
  var alerts = computeAlerts();
  var filtered = alerts.filter(function(a){
    return (!alertFilterLigne || a.ligne===alertFilterLigne) && (!alertFilterModule || a.module===alertFilterModule);
  });
  var late = filtered.filter(function(a){ return a.level==='danger'; }).sort(function(a,b){
    return (a.echeance&&b.echeance) ? a.echeance.localeCompare(b.echeance) : 0;
  });
  var upcoming = filtered.filter(function(a){
    if(a.level!=='warn') return false;
    if(!a.echeance) return true;
    var d = daysBetween(todayStr(), a.echeance);
    return d<=alertHorizon;
  }).sort(function(a,b){ return (a.echeance&&b.echeance) ? a.echeance.localeCompare(b.echeance) : 0; });

  var html = '<div class="alert-toolbar">';
  html += '<select id="flt-alert-ligne"><option value="">Toutes les lignes</option>'+LINES.map(function(l){return '<option value="'+l+'"'+(l===alertFilterLigne?' selected':'')+'>'+l+'</option>';}).join('')+'</select>';
  html += '<select id="flt-alert-module"><option value="">Tous les modules</option>'+MODULES.map(function(m){return '<option value="'+m+'"'+(m===alertFilterModule?' selected':'')+'>'+m+'</option>';}).join('')+'</select>';
  html += '<label class="tiny" style="display:flex; align-items:center; gap:6px;">Échéances à venir sous J+<input type="number" id="alert-horizon" value="'+alertHorizon+'" min="1" style="width:56px;"></label>';
  html += '</div>';

  if(!alerts.length) return html+'<div class="empty">Aucune alerte. Tout est à jour.</div>';

  html += '<div class="alert-cols">';
  html += alertTable('En retard', late, 'danger');
  html += alertTable('À venir', upcoming, 'warn');
  html += '</div>';
  return html;
}

function alertTable(title, items, level){
  var html = '<div class="alert-group"><div class="alert-group-title alert-group-'+level+'">'+esc(title)+' ('+items.length+')</div>';
  if(!items.length) return html+'<div class="empty">Aucune entrée.</div></div>';
  html += '<div class="table-wrap"><table class="alert-table alert-table-'+level+'"><thead><tr><th></th><th>Module</th><th>Ligne</th><th>Élément</th><th>Échéance</th><th>Délai</th></tr></thead><tbody>';
  items.forEach(function(a){
    var dl = daysLabel(a.echeance);
    html += '<tr class="alert-row" data-alert-id="'+a.id+'"><td><span class="chev">▸</span></td><td>'+esc(a.module)+'</td><td>'+esc(val(a.ligne,'—'))+'</td><td>'+esc(a.title)+'<div class="tiny">'+esc(a.meta)+'</div></td>'+
      '<td class="num">'+(a.echeance?fmtDate(a.echeance):'—')+'</td>'+
      '<td>'+(dl? '<span class="delay-pill delay-'+(dl.d<0?'late':dl.d<=3?'soon':'ok')+'">'+dl.text+'</span>' : '—')+'</td></tr>';
    html += '<tr class="alert-detail-row" data-alert-detail="'+a.id+'" style="display:none"><td colspan="6">'+a.detail+'</td></tr>';
  });
  html += '</tbody></table></div></div>';
  return html;
}

var POLL_INTERVAL_MS = 10000;
var pollTimer = null;
function isUserMidEdit(){
  if(auditWizard || metroEditingId || planningEditingId || contamDirectFormOpen || contamCollecteFormOpen || contamAnalyseEditId || accountFormState || roleFormState || ateqActionFormOpen || particuleCampagneFormOpen || particuleDTEditId || particuleResultatEditId) return true;
  var openForms = document.querySelectorAll('form[id^="form-"]');
  for(var i=0;i<openForms.length;i++){ if(openForms[i].style.display!=='none') return true; }
  return false;
}
var lastChartRefresh = 0;
var CHART_REFRESH_MS = 60000;
async function pollForUpdates(){
  if(STORAGE_MODE!=='supabase' || !currentUser || isUserMidEdit()) return;
  try{
    var changed = false;
    for(var k in KEYS){
      var res = await backendGet(KEYS[k]);
      var newVal = res ? JSON.parse(res.value) : (Array.isArray(DATA[k]) ? [] : DATA[k]);
      if(res && JSON.stringify(newVal) !== JSON.stringify(DATA[k])){
        DATA[k] = newVal;
        changed = true;
      }
    }
    if(changed && !isUserMidEdit()){
      if(currentTab==='dashboard' && (Date.now()-lastChartRefresh) < CHART_REFRESH_MS) return;
      renderNav();
      renderUserbox();
      render();
    }
  }catch(e){ console.error('poll error', e); }
}
function startPolling(){
  stopPolling();
  pollTimer = setInterval(pollForUpdates, POLL_INTERVAL_MS);
}
function stopPolling(){
  if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
}

async function handleSaveAccount(){

// ---------- exports ----------
function buildMetroExport(){
  var items = DATA.metro.filter(function(e){ return metroStatus(e).level!=='ok'; })
    .sort(function(a,b){ return (a.echeance||'').localeCompare(b.echeance||''); });
  var txt = 'Suivi métrologie — secteur MCU\nPoints à traiter au '+fmtDate(todayStr())+' :\n\n';
  if(!items.length) txt += 'Aucun instrument à signaler pour le moment.\n';
  items.forEach(function(e){
    var s = metroStatus(e);
    txt += '- ['+s.label+'] '+e.ligne+' — '+e.designation+' (n° '+e.numMoyen+', '+esc0(e.lieu)+') — échéance '+fmtDate(e.echeance)+'\n';
  });
  return txt;
}
function buildProprExport(){
  var rows = DATA.resultats.filter(function(r){ return r.resultatPct<90; })
    .sort(function(a,b){ return (b.id||'').localeCompare(a.id||''); });
  var txt = 'Suivi propreté — secteur MCU\nRésultats à surveiller au '+fmtDate(todayStr())+' :\n\n';
  if(!rows.length) txt += 'Aucun résultat sous le seuil de 90% pour le moment.\n';
  rows.forEach(function(r){ txt += '- '+r.ligne+' ('+r.mois+') : '+r.resultatPct+'%\n'; });
  return txt;
}
function esc0(s){ return s? s : 'lieu non précisé'; }

function buildWeeklyDigest(){
  var alerts = computeAlerts();
  var late = alerts.filter(function(a){ return a.level==='danger'; }).sort(function(a,b){ return (a.echeance&&b.echeance)?a.echeance.localeCompare(b.echeance):0; });
  var txt = 'Résumé qualité MCU — semaine du '+fmtDate(todayStr())+'\n\n';
  txt += late.length+' point(s) en retard :\n\n';
  if(!late.length) txt += "Aucun retard à signaler. Tout est à jour.\n";
  late.forEach(function(a){
    var dl = daysLabel(a.echeance);
    txt += '- ['+a.module+'] '+(a.ligne?a.ligne+' — ':'')+a.title+(dl?' ('+dl.text+')':'')+'\n';
  });
  return txt;
}

var chartGlobalGauge=null;

    });

var chartTrend=null;
function renderTrendChart(){
  if(typeof Chart==='undefined') return;
  var ctx = document.getElementById('chart-trend');
  if(!ctx) return;
  if(chartTrend){ chartTrend.destroy(); chartTrend=null; }
  try{
    var months = [];
    var d = new Date();
    for(var i=11;i>=0;i--){
      var dd = new Date(d.getFullYear(), d.getMonth()-i, 1);
      months.push({label: MONTHS_FR[dd.getMonth()].slice(0,3)+' '+String(dd.getFullYear()).slice(2), monthIdx:dd.getMonth(), year:dd.getFullYear(), monthName: MONTHS_FR[dd.getMonth()].charAt(0).toUpperCase()+MONTHS_FR[dd.getMonth()].slice(1)});
    }
    var proprScores = months.map(function(m){
      var rs = DATA.resultats.filter(function(r){ return r.mois===m.monthName && (r.annee===m.year || r.annee===undefined) && r.resultatPct!==null && r.resultatPct!==undefined; });
      if(!rs.length) return null;
      return Math.round(rs.reduce(function(s,r){return s+r.resultatPct;},0)/rs.length);
    });
    var ateqDefauts = months.map(function(m){
      var as = DATA.ateq.filter(function(a){ var dt=new Date(a.date); return dt.getMonth()===m.monthIdx && dt.getFullYear()===m.year; });
      if(!as.length) return null;
      return as.reduce(function(s,a){return s+(a.nbDefauts||0);},0);
    });
    chartTrend = new Chart(ctx, {
      data:{labels:months.map(function(m){return m.label;}),
        datasets:[
          {type:'line', label:'Score propreté moyen (%)', data:proprScores, borderColor:'#1F5C5C', backgroundColor:'#1F5C5C22', borderWidth:2, pointRadius:3, yAxisID:'y', spanGaps:true},
          {type:'bar', label:'Défauts ATEQ (total mensuel)', data:ateqDefauts, backgroundColor:'#B8730A66', borderColor:'#B8730A', borderWidth:1, yAxisID:'y1'}
        ]},
      options:{responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
        scales:{
          y:{type:'linear', position:'left', min:0, max:100, title:{display:true,text:'Score propreté (%)'}},
          y1:{type:'linear', position:'right', beginAtZero:true, grid:{drawOnChartArea:false}, title:{display:true,text:'Défauts ATEQ'}}
        }}
    });
  }catch(err){ console.error('chart error', err); }
}

  if(item) logChange(MODULE_LABELS[mod]||mod, 'Suppression', describeEntry(mod, item));

async function handleMarkDone(mod, id){

    var item = DATA.planning.find(function(x){ return x.id===id; });
    if(item){ item.realisation = todayStr(); await save('planning'); logChange('Planning', 'Réalisation', describeEntry('planning', item)); render(); }
  }

async function handleChangeStatus(id, newVal){
  var item = DATA.actions.find(function(x){ return x.id===id; });
  if(item){
    var before = item.statut;
    item.statut = newVal;
    await save('actions');
    logChange("Plan d'actions", 'Changement de statut', item.description, before+' → '+newVal);

function describeEntry(mod, item){
  if(mod==='metro') return item.designation+' ('+item.numMoyen+')';
  if(mod==='planning') return item.ligne+' — '+item.type;
  if(mod==='ateq') return item.ligne+' — '+fmtDate(item.date);
  if(mod==='actions') return item.description;
  if(mod==='vidange') return item.equipement;
  if(mod==='contamination') return item.ligne+' · '+item.ref;
  if(mod==='particules') return item.ligne+' · '+item.poste+' — '+item.nbParticules+' particules';
  return item.id;
}

async function handleFormSubmit(form){
  var mod = form.id.replace('form-','');
  var fd = new FormData(form);
  var entry = {id: uid(mod)};
  Array.prototype.forEach.call(form.elements, function(el){
    if(el.name && el.type!=='file') entry[el.name] = fd.get(el.name);
  });
  var fileInput = form.querySelector('input[type=file]');
  if(fileInput && fileInput.files[0]){
    try{
      var isImg = fileInput.files[0].type.indexOf('image')===0;
      entry[fileInput.name] = await fileFromInput(fileInput, isImg);
    }catch(err){ alert(err.message); return; }
  }
  if(mod==='ateq'){ entry.nbDefauts = parseInt(entry.nbDefauts||0,10); entry.nb2nd = parseInt(entry.nb2nd||0,10); }
  if(mod==='resultats'){ entry.resultatPct = parseFloat(entry.resultatPct||0); }
  if(mod==='planning'){ entry.resultatPct = (entry.resultatPct!==undefined && entry.resultatPct!=='') ? parseFloat(entry.resultatPct) : null; }
  if(mod==='releves'){ entry.massePolluante = parseFloat(entry.massePolluante||0); }
  if(mod==='vidange'){ entry.intervalle = parseInt(entry.intervalle||VIDANGE_INTERVALLE,10); }
  if(mod==='actions'){ entry.dateCreation = todayStr(); }
  DATA[mod].push(entry);
  await save(mod);
  logChange(MODULE_LABELS[mod]||mod, 'Création', describeEntry(mod, entry));
  if(mod==='planning' && entry.echeance){
    planningMoisFilter = entry.echeance.slice(0,7);
    alert('Échéance ajoutée : '+entry.ligne+' — '+(PLAN_TYPES.filter(function(t){return t[0]===entry.type;})[0]||['',entry.type])[1]+' le '+fmtDate(entry.echeance)+'.');
  }
  form.reset();
  form.style.display = 'none';
  render();
}

async function handleSaveAteqWeek(){
  var cells = document.querySelectorAll('.ateq-cell');
  var byKey = {};
  Array.prototype.forEach.call(cells, function(inp){
    var key = inp.dataset.date+'|'+inp.dataset.ligne;
    if(!byKey[key]) byKey[key] = {date:inp.dataset.date, ligne:inp.dataset.ligne};
    if(inp.value!=='') byKey[key][inp.dataset.field] = parseInt(inp.value,10);
  });
  Object.keys(byKey).forEach(function(key){
    var v = byKey[key];
    if(v.nbDefauts===undefined && v.nb2nd===undefined) return;
    var existing = DATA.ateq.find(function(a){ return a.date===v.date && a.ligne===v.ligne; });
    if(existing){
      if(v.nbDefauts!==undefined) existing.nbDefauts = v.nbDefauts;
      if(v.nb2nd!==undefined) existing.nb2nd = v.nb2nd;
    } else {
      DATA.ateq.push({id:uid('ateq'), date:v.date, ligne:v.ligne, nbDefauts:v.nbDefauts||0, nb2nd:v.nb2nd||0});
    }
  });
  await save('ateq');
  render();
}

  var saveResBtn = e.target.closest('[data-action="save-resultat"]');
  if(saveResBtn){ await handleSaveResultat(saveResBtn.dataset.id); return; }

  if(e.target.closest('[data-action="new-ateq-action"]')){ ateqActionFormOpen = true; render(); return; }
  if(e.target.closest('[data-action="cancel-ateq-action"]')){ ateqActionFormOpen = false; render(); return; }
  if(e.target.closest('[data-action="save-ateq-action"]')){ await handleSaveAteqAction(); return; }

  if(e.target.closest('[data-action="logout"]')){ handleLogout(); return; }
  if(e.target.closest('[data-action="new-account"]')){ handleNewAccount(); return; }
  var editAccBtn = e.target.closest('[data-action="edit-account"]');
  if(editAccBtn){ handleEditAccount(editAccBtn.dataset.id); return; }
  if(e.target.closest('[data-action="cancel-account"]')){ accountFormState = null; render(); return; }
  if(e.target.closest('[data-action="save-account"]')){ await handleSaveAccount(); return; }
  var delAccBtn = e.target.closest('[data-action="delete-account"]');
  if(delAccBtn){ await handleDeleteAccount(delAccBtn.dataset.id); return; }
  if(e.target.closest('[data-action="new-role"]')){ handleNewRole(); return; }
  if(e.target.closest('[data-action="cancel-role"]')){ roleFormState = null; render(); return; }
  if(e.target.closest('[data-action="save-role"]')){ await handleSaveRole(); return; }
  var delRoleBtn = e.target.closest('[data-action="delete-role"]');
  if(delRoleBtn){ await handleDeleteRole(delRoleBtn.dataset.id); return; }

  if(e.target.closest('[data-action="weekly-digest"]')){ handleWeeklyDigest(); return; }
  if(e.target.closest('[data-action="print-dashboard"]')){ handlePrintDashboard(); return; }
  var exportBtn = e.target.closest('[data-action="export"]');
  if(exportBtn){ showExport(exportBtn.dataset.module); return; }

  var photoImg = e.target.closest('[data-action="view-photo"]');
  if(photoImg){ window.open(photoImg.src, '_blank'); return; }

  var startAuditBtn = e.target.closest('[data-action="start-audit"]');
  if(startAuditBtn){ handleStartAudit(); return; }
  if(e.target.closest('[data-action="cancel-audit"]')){ handleCancelAudit(); return; }
  if(e.target.closest('[data-action="wizard-next"]')){ await handleWizardNext(); return; }
  if(e.target.closest('[data-action="wizard-prev"]')){ handleWizardPrev(); return; }
  if(e.target.closest('[data-action="save-audit"]')){ await handleSaveAudit(); return; }
  var viewAuditBtn = e.target.closest('[data-action="view-audit"]');
  if(viewAuditBtn){ openAuditDetailId = viewAuditBtn.dataset.id; render(); return; }
  if(e.target.closest('[data-action="close-audit-detail"]')){ openAuditDetailId = null; render(); return; }
  var delAuditBtn = e.target.closest('[data-action="delete-audit"]');
  if(delAuditBtn){ await handleDeleteAudit(delAuditBtn.dataset.id); return; }
  if(e.target.closest('[data-action="month-prev"]')){ resultsMonthView = (resultsMonthView+11)%12; render(); return; }
  if(e.target.closest('[data-action="month-next"]')){ resultsMonthView = (resultsMonthView+1)%12; render(); return; }
  var gotoMonthBtn = e.target.closest('[data-action="goto-month"]');
  if(gotoMonthBtn){ resultsMonthView = Number(gotoMonthBtn.dataset.month); render(); return; }

  var alertRow = e.target.closest('.alert-row');
  if(alertRow){
    var detailRow = document.querySelector('[data-alert-detail="'+alertRow.dataset.alertId+'"]');
    if(detailRow){
      var showing = detailRow.style.display !== 'none';
      detailRow.style.display = showing ? 'none' : 'table-row';
      alertRow.classList.toggle('expanded', !showing);
    }
    return;
  }
});

app.addEventListener('change', async function(e){
  if(e.target.matches('[data-action="change-status"]')){
    await handleChangeStatus(e.target.dataset.id, e.target.value);
    return;
  }
  if(e.target.matches('[data-crit-field]')){
    var critId = e.target.dataset.critId, fld = e.target.dataset.critField;
    var entry = getWizardCritEntry(critId);
    if(fld==='photo'){
      if(e.target.files[0]){
        try{ entry.photo = await readImageResized(e.target.files[0]); }catch(err){ alert(err.message); }
      }
    } else { entry[fld] = e.target.value; }
    return;
  }
  if(e.target.id==='results-year'){ resultsYear = Number(e.target.value); render(); return; }
  if(e.target.id==='cc-ligne'){ contamCollecteState.ligne = e.target.value; contamCollecteState.ref = refsForLigne(e.target.value)[0]; render(); return; }
  if(e.target.id==='cc-ref'){ contamCollecteState.ref = e.target.value; render(); return; }
  if(e.target.id==='cd-ligne'){ contamDirectState.ligne = e.target.value; contamDirectState.ref = refsForLigne(e.target.value)[0]; render(); return; }
  if(e.target.id==='cd-ref'){ contamDirectState.ref = e.target.value; render(); return; }
  if(e.target.id==='flt-planning-type'){ planningTypeFilter = e.target.value; applyPlanningFilter(); return; }
  if(e.target.id==='flt-planning-ligne'){ planningLigneFilter = e.target.value; applyPlanningFilter(); return; }
  if(e.target.id==='flt-planning-mois'){ planningMoisFilter = e.target.value; applyPlanningFilter(); return; }
  if(e.target.id==='flt-metro-ligne'){ applyMetroFilter(); return; }
  if(e.target.id==='flt-alert-ligne'){ alertFilterLigne = e.target.value; applyAlertFilters(); return; }
  if(e.target.id==='flt-alert-module'){ alertFilterModule = e.target.value; applyAlertFilters(); return; }
  if(e.target.id==='alert-horizon'){ alertHorizon = Math.max(1, Number(e.target.value)||14); applyAlertFilters(); return; }
  if(e.target.matches('[data-action="toggle-role-tab"]')){ await handleToggleRoleTab(e.target.dataset.role, e.target.dataset.tabkey, e.target.checked); return; }
  if(e.target.matches('[data-action="toggle-role-audit"]')){ await handleToggleRoleAudit(e.target.dataset.role, e.target.checked); return; }
});

app.addEventListener('submit', async function(e){
  e.preventDefault();
  if(e.target.id && e.target.id.indexOf('form-')===0){ await handleFormSubmit(e.target); }
});

function applyPlanningFilter(){
  var t = document.getElementById('flt-planning-type').value;
  var l = document.getElementById('flt-planning-ligne').value;
  var m = document.getElementById('flt-planning-mois').value;
  Array.prototype.forEach.call(document.querySelectorAll('#planning-rows tr[data-row-ligne]'), function(tr){
    var show = (!t || tr.dataset.rowType===t) && (!l || tr.dataset.rowLigne===l) && (!m || tr.dataset.rowMois===m);
    tr.style.display = show? '' : 'none';
  });
}
function applyMetroFilter(){
  var l = document.getElementById('flt-metro-ligne').value;
  Array.prototype.forEach.call(document.querySelectorAll('#metro-rows tr[data-row-ligne]'), function(tr){
    tr.style.display = (!l || tr.dataset.rowLigne===l) ? '' : 'none';
  });
}

// ---------- init ----------
function showFatalError(label, err){
  var msg = (err && (err.stack || err.message)) ? (err.message||'') + '\n' + (err.stack||'') : String(err);
  view.innerHTML = '<div class="card" style="border-color:#EFC2B8; background:#FBE7E3;">'+
    '<div style="font-weight:600; color:#B23B2E; margin-bottom:8px;">Erreur au chargement ('+esc(label)+')</div>'+
    '<div style="font-size:12px; color:#6E6A60; margin-bottom:8px;">Merci de copier ce message et de le transmettre :</div>'+
    '<textarea readonly style="width:100%; min-height:160px; font-family:var(--mono); font-size:11px;">'+esc(msg)+'</textarea>'+
    '</div>';
}
window.addEventListener('error', function(e){ showFatalError('window.onerror', e.error || e.message); });
window.addEventListener('unhandledrejection', function(e){ showFatalError('unhandledrejection', e.reason); });

var loginOverlayEl = document.getElementById('login-overlay');
window.addEventListener('beforeprint', function(){
  [chartTrend, chartProprEvol, chartProprComp, chartContam].forEach(function(c){
    if(c){ try{ c.resize(); }catch(e){} }
  });
});

loginOverlayEl.addEventListener('click', async function(e){
  if(e.target.id==='login-submit'){ await handleLogin(); }
});
loginOverlayEl.addEventListener('keydown', async function(e){
  if(e.key==='Enter' && (e.target.id==='login-password' || e.target.id==='login-username')){ await handleLogin(); }
});

async function init(){
  try{
    document.getElementById('todaylabel').textContent = 'Aujourd\'hui : ' + fmtDate(todayStr());
    await loadAll();
    var bootstrapped = bootstrapAdmin();
    if(bootstrapped){ await save('roles'); await save('accounts'); }
    var sess = getSession();
    if(sess){ currentUser = DATA.accounts.find(function(a){ return a.id===sess.accountId; }) || null; }
    if(currentUser){
      loginOverlayEl.classList.add('hidden');
      renderNav();
      renderUserbox();
      render();
      startPolling();
    } else {
      renderLoginOverlay();
    }
  }catch(err){
    showFatalError('init', err);
  }
}
init();

})();
